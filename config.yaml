experiment:
  distance: 10000        # m
  max_power: 13          # dBm
  actual_power: 13       # dBm
  inv_time: 2400         # s
  wait_time: 600         # s
  fq: 193.5e+12          # Hz
  fsyn: 193.3e+12        # Hz
  spacing: 100.0e+9      # Hz
  num_c: 8
  raman_file: "simulation/Ramancrosssection25GHz（25GHz间隔）.xls"
  repetition: 1          # 实验重复次数
  spacing_list:
    - 100000000000        # 信道间隔列表 (Hz)
  scheme_name_list:      # 实验方案名称列表
    - "interleave"
    - "CCA"
    - "max_SKR"
    - "stable_SKR"
  light_source:
    type: "TLS"              # TLS | SFP | OTN
    tls_bandwidth: 20.0e+9   # Hz
    sfp_bandwidth: 20.0e+9   # Hz (OSA光谱图实测99%功率带宽)
    otn_bandwidth: 45.0e+9   # Hz (OSA光谱图实测99%功率带宽)
    tls_max_count: 8
    sfp_max_count: 1
    otn_max_count: 1
