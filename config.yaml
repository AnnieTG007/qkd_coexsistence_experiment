    iqs_ip: "192.168.1.101"

  osa:
    ip: "192.168.1.113"
    port: 10001

  qkd:
    ip: "192.168.1.20"
    port: 56100
    username: "qkd"
    password: "qasky1234"
    log_file_path: "log"
    log_file_name: "qkd.alice-bob.log.0"

  ase:
    port: "COM6"
    baud: 9600
    target_power_mw: 100

  sfp:
    transport: "serial"
    serial_port: "COM3"
